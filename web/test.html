<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NAOS Test</title>
    <link rel="stylesheet" href="test.scss" />
  </head>
  <body>
    <header>
      <h1>NAOS</h1>
      <span id="status">No device</span>
    </header>
    <div class="toolbar">
      <span class="label">Connect</span>
      <button onclick="_ble()">BLE</button>
      <button onclick="_serial()">Serial</button>
      <button onclick="_http()">HTTP</button>
      <button class="device-connected" onclick="_disconnect()" disabled>
        Disconnect
      </button>
      <div class="sep"></div>
      <span class="label">Session</span>
      <button
        class="device-connected"
        id="activate-btn"
        onclick="_activate()"
        disabled
      >
        Activate
      </button>
      <button class="device-active" onclick="_unlock()" disabled>Unlock</button>
      <button class="device-unlocked" onclick="_password()" disabled>
        Password
      </button>
      <div class="sep"></div>
      <span class="label">Test</span>
      <button class="device-unlocked" onclick="_params()" disabled>
        Params
      </button>
      <button class="device-unlocked" onclick="_fs()" disabled>FS</button>
      <button class="device-unlocked" onclick="_metrics()" disabled>
        Metrics
      </button>
      <button class="device-unlocked" onclick="_relay()" disabled>Relay</button>
      <button class="device-unlocked" onclick="_auth()" disabled>Auth</button>
      <button class="device-unlocked" onclick="_debug()" disabled>Debug</button>
      <button class="device-unlocked" onclick="_throughput()" disabled>
        Throughput
      </button>
      <button class="device-unlocked" onclick="_transfer()" disabled>
        Transfer
      </button>
      <button class="device-unlocked" onclick="_memory()" disabled>
        Memory
      </button>
      <div class="sep"></div>
      <input
        class="device-unlocked"
        type="file"
        onchange="_flash(this)"
        disabled
      />
    </div>
    <div id="log"></div>
    <footer>
      <button onclick="_clearLog()">Clear Log</button>
      <span id="memory-display"></span>
    </footer>
    <script type="module" src="test.ts"></script>
  </body>
</html>
